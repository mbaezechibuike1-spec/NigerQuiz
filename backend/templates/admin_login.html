<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Niger Quiz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .admin-login {
            max-width: 400px;
            margin: 100px auto;
        }
        .admin-login h2 {
            text-align: center;
            color: #ffd200;
            margin-bottom: 30px;
        }
        .admin-login .form-box {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
        }
        .admin-login .form-box input {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container admin-login">
        <h2>🔐 Admin Login</h2>
        <div class="form-box">
            {% if error %}
            <div style="color: #ff4444; text-align: center; margin-bottom: 15px; padding: 10px; background: rgba(255,68,68,0.1); border-radius: 10px;">
                {{ error }}
            </div>
            {% endif %}
            <form method="POST">
                <input type="text" name="username" placeholder="👤 Admin Username" required>
                <input type="password" name="password" placeholder="🔒 Password" required>
                <button type="submit" class="btn-primary btn-full">Login</button>
            </form>
            <p style="text-align: center; margin-top: 15px; color: rgba(255,255,255,0.4); font-size: 0.85rem;">
                Default: admin / admin123
            </p>
        </div>
    </div>
</body>
</html>
